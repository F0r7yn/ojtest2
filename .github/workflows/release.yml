# yaml-language-server: $schema=https://json-schema.org/draft-07/schema#
name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release_github_packages:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check_version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Check Version
        id: check_version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -f VERSION ]]; then
            version=$(tr -d '[:space:]' < VERSION)
            if [[ "$version" == v* ]]; then
              tag_exists=false
              release_exists=false
              if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
                tag_exists=true
              fi
              if gh release view "$version" >/dev/null 2>&1; then
                release_exists=true
              fi
              echo "tag_exists=$tag_exists" >> "$GITHUB_OUTPUT"
              echo "release_exists=$release_exists" >> "$GITHUB_OUTPUT"
            fi
            if [[ "$version" == v* ]] && { [[ "$tag_exists" == false ]] || [[ "$release_exists" == false ]]; }; then
              echo "tag=$version" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create Tag
        if: ${{ startsWith(steps.check_version.outputs.tag, 'v') && steps.check_version.outputs.tag_exists != 'true' }}
        env:
          RELEASE_TAG: ${{ steps.check_version.outputs.tag }}
        run: |
          git tag "$RELEASE_TAG"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Release
        if: ${{ startsWith(steps.check_version.outputs.tag, 'v') && steps.check_version.outputs.release_exists != 'true' }}
        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            RELEASE_TAG: ${{ steps.check_version.outputs.tag }}
        run: gh release create "$RELEASE_TAG" --verify-tag --generate-notes --title "$RELEASE_TAG"

  release-docker-image:
      runs-on: ubuntu-latest
      needs: release_github_packages
      if: ${{ startsWith(needs.release_github_packages.outputs.tag, 'v') }}
      env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          ALIYUN_REGISTRY_USERNAME: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          ALIYUN_REGISTRY_TOKEN: ${{ secrets.ALIYUN_REGISTRY_TOKEN }}
      steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
              ref: ${{ needs.release_github_packages.outputs.tag }}

        - name: Set Tag
          id: get-tag
          run: |
              tag=$(cat VERSION)
              echo "before: ${tag}"
              prefix="v"
              tag=${tag#"${prefix}"}
              echo "tag=$tag" >> "$GITHUB_OUTPUT"
              echo "after: ${tag}"

        - name: Check Docker publish secrets
          id: docker-publish-secrets
          shell: bash
          run: |
              if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" && -n "$ALIYUN_REGISTRY_USERNAME" && -n "$ALIYUN_REGISTRY_TOKEN" ]]; then
                  echo "available=true" >> "$GITHUB_OUTPUT"
              else
                  echo "available=false" >> "$GITHUB_OUTPUT"
              fi

        - name: Skip Docker publish
          if: ${{ steps.docker-publish-secrets.outputs.available != 'true' }}
          run: echo "Docker registry secrets are not configured; skipping image publish."

        - name: Set up QEMU
          if: ${{ steps.docker-publish-secrets.outputs.available == 'true' }}
          id: qemu
          uses: docker/setup-qemu-action@v3
          with:
              image: tonistiigi/binfmt:latest
              platforms: all

        - name: Available platforms
          if: ${{ steps.docker-publish-secrets.outputs.available == 'true' }}
          run: echo ${{ steps.qemu.outputs.platforms }}

        - name: Set up Docker Buildx
          if: ${{ steps.docker-publish-secrets.outputs.available == 'true' }}
          id: buildx
          uses: docker/setup-buildx-action@v3

        - name: Inspect builder
          if: ${{ steps.docker-publish-secrets.outputs.available == 'true' }}
          run: |
              echo "Name:      ${{ steps.buildx.outputs.name }}"
              echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
              echo "Status:    ${{ steps.buildx.outputs.status }}"
              echo "Flags:     ${{ steps.buildx.outputs.flags }}"
              echo "Platforms: ${{ steps.buildx.outputs.platforms }}"

        - name: Login to Docker Hub
          if: ${{ steps.docker-publish-secrets.outputs.available == 'true' }}
          uses: docker/login-action@v3
          with:
              username: ${{ env.DOCKERHUB_USERNAME }}
              password: ${{ env.DOCKERHUB_TOKEN }}

        - name: Login to ALiYun Container Registry
          if: ${{ steps.docker-publish-secrets.outputs.available == 'true' }}
          uses: docker/login-action@v3
          with:
              registry: registry.cn-beijing.aliyuncs.com
              username: ${{ env.ALIYUN_REGISTRY_USERNAME }}
              password: ${{ env.ALIYUN_REGISTRY_TOKEN }}

        - name: Cache Docker layers
          if: ${{ steps.docker-publish-secrets.outputs.available == 'true' }}
          uses: actions/cache@v3
          with:
              path: /tmp/.buildx-cache
              key: ${{ runner.os }}-single-buildx-${{ github.sha }}
              restore-keys: |
                  ${{ runner.os }}-single-buildx

        - name: Build and push
          if: ${{ steps.docker-publish-secrets.outputs.available == 'true' }}
          uses: docker/build-push-action@v5
          env:
              image_name: hznuoj
              tag: ${{ steps.get-tag.outputs.tag }}
          with:
              context: .
              file: ./docker/Dockerfile
              platforms: linux/amd64,linux/arm64
              push: true
              tags: |
                  hznuoj/${{ env.image_name }}:latest
                  hznuoj/${{ env.image_name }}:${{ env.tag }}
                  registry.cn-beijing.aliyuncs.com/dup4/${{ env.image_name }}:latest
                  registry.cn-beijing.aliyuncs.com/dup4/${{ env.image_name }}:${{ env.tag }}
            #   cache-from: type=local,src=/tmp/.buildx-cache
            #   cache-to: type=local,dest=/tmp/.buildx-cache-new

            # Temp fix
            # https://github.com/docker/build-push-action/issues/252
            # https://github.com/moby/buildkit/issues/1896
          # - name: Move cache
          #   run: |
          #       rm -rf /tmp/.buildx-cache
          #       mv /tmp/.buildx-cache-new /tmp/.buildx-cache
